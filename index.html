<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gastos Compartidos</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0a0d1f;
    --surface: #141829;
    --text: #ffffff;
    --muted: #9ca3af;
    --accent: #a3e635;
    
    --casa: #f97316;
    --casa-dark: #ea580c;
    --comida: #eab308;
    --comida-dark: #ca8a04;
    --movilidad: #a855f7;
    --movilidad-dark: #9333ea;
    --andre: #3b82f6;
    --andre-dark: #2563eb;
    
    --radius: 24px;
    --radius-sm: 16px;
  }

  body {
    background: #000000;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    min-height: 100vh;
    padding: 0 0 40px 0;
  }

  /* Header */
  .header {
    padding: 16px 20px 20px;
    position: relative;
    padding-top: max(16px, env(safe-area-inset-top));
    background: #000000;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    gap: 12px;
  }

  .label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
    flex: 1;
  }

  .ciclo-selector {
    appearance: none;
    background: rgba(200,241,53,0.08);
    border: 1px solid rgba(200,241,53,0.3);
    color: var(--accent);
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
  }

  .ciclo-selector:focus {
    outline: none;
    border-color: var(--accent);
    background: rgba(200,241,53,0.12);
  }

  .total-grande {
    font-size: 64px;
    font-weight: 900;
    letter-spacing: -2px;
    line-height: 1;
    margin: 0 0 4px;
    background: linear-gradient(135deg, var(--accent) 0%, #84cc16 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .total-grande span {
    font-size: 28px;
    font-weight: 700;
    -webkit-text-fill-color: var(--muted);
  }

  .mitad-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
  }

  .mitad-chip {
    background: rgba(200,241,53,0.08);
    border: 1px solid rgba(200,241,53,0.25);
    border-radius: 12px;
    padding: 8px 14px;
    font-size: 13px;
    color: var(--muted);
    font-weight: 500;
  }

  .mitad-chip strong {
    color: var(--accent);
    font-weight: 700;
    font-size: 14px;
  }

  /* Secciones */
  .section {
    padding: 28px 20px 0;
  }

  .section-title {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
    margin-bottom: 14px;
  }

  /* Cards de categoría */
  .cat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }

  .cat-card {
    background: linear-gradient(135deg, var(--bg) 0%, var(--surface) 100%);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius-sm);
    padding: 16px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    min-height: 140px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .cat-card:active {
    transform: scale(0.96);
  }

  .cat-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    opacity: 0.08;
    pointer-events: none;
  }

  .cat-card.CASA {
    border-color: rgba(249, 115, 22, 0.3);
    box-shadow: inset 0 1px 0 rgba(249, 115, 22, 0.1);
  }

  .cat-card.CASA::before {
    background: linear-gradient(135deg, var(--casa) 0%, transparent 100%);
  }

  .cat-card.COMIDA {
    border-color: rgba(234, 179, 8, 0.3);
    box-shadow: inset 0 1px 0 rgba(234, 179, 8, 0.1);
  }

  .cat-card.COMIDA::before {
    background: linear-gradient(135deg, var(--comida) 0%, transparent 100%);
  }

  .cat-card.MOVILIDAD {
    border-color: rgba(168, 85, 247, 0.3);
    box-shadow: inset 0 1px 0 rgba(168, 85, 247, 0.1);
  }

  .cat-card.MOVILIDAD::before {
    background: linear-gradient(135deg, var(--movilidad) 0%, transparent 100%);
  }

  .cat-card.ANDRE {
    border-color: rgba(59, 130, 246, 0.3);
    box-shadow: inset 0 1px 0 rgba(59, 130, 246, 0.1);
  }

  .cat-card.ANDRE::before {
    background: linear-gradient(135deg, var(--andre) 0%, transparent 100%);
  }

  .cat-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
  }

  .cat-emoji {
    font-size: 28px;
    line-height: 1;
  }

  .cat-name {
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
    text-align: right;
  }

  .cat-content {
    position: relative;
    z-index: 1;
  }

  .cat-monto {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.1;
  }

  .cat-monto .sym {
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
  }

  .cat-pct {
    font-size: 11px;
    color: var(--muted);
    font-weight: 600;
  }

  /* Lista de gastos */
  .gastos-list {
    display: flex;
    flex-direction: column;
    gap: 0;
    background: rgba(255,255,255,0.03);
    border-radius: var(--radius-sm);
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
    margin-bottom: 24px;
    backdrop-filter: blur(10px);
  }

  .gasto-item {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    gap: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: background 0.2s ease;
  }

  .gasto-item:last-child {
    border-bottom: none;
  }

  .gasto-item:active {
    background: rgba(255,255,255,0.05);
  }

  .gasto-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .gasto-dot.CASA { background: var(--casa); }
  .gasto-dot.COMIDA { background: var(--comida); }
  .gasto-dot.MOVILIDAD { background: var(--movilidad); }
  .gasto-dot.ANDRE { background: var(--andre); }
  .gasto-dot.default { background: var(--muted); }

  .gasto-info {
    flex: 1;
    min-width: 0;
  }

  .gasto-concepto {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }

  .gasto-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }

  .gasto-monto {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    flex-shrink: 0;
  }

  /* Compras en cuotas */
  .cuotas-list {
    display: flex;
    flex-direction: column;
    gap: 0;
    background: rgba(255,255,255,0.03);
    border-radius: var(--radius-sm);
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
    margin-bottom: 24px;
    backdrop-filter: blur(10px);
  }

  .cuota-item {
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: background 0.2s ease;
  }

  .cuota-item:last-child {
    border-bottom: none;
  }

  .cuota-item:active {
    background: rgba(255,255,255,0.05);
  }

  .cuota-header {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: space-between;
  }

  .cuota-left {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    min-width: 0;
  }

  .cuota-emoji {
    font-size: 24px;
    flex-shrink: 0;
  }

  .cuota-info {
    flex: 1;
    min-width: 0;
  }

  .cuota-concepto {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }

  .cuota-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .cuota-monto {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    flex-shrink: 0;
    text-align: right;
  }

  .cuota-progress {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .cuota-bar {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
  }

  .cuota-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent) 0%, #84cc16 100%);
    border-radius: 3px;
    transition: width 0.3s ease;
  }

  .cuota-label {
    font-size: 11px;
    color: var(--muted);
    font-weight: 600;
    white-space: nowrap;
    min-width: 40px;
    text-align: right;
  }

  /* Loading / error */
  .estado {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    gap: 12px;
    color: var(--muted);
    font-size: 14px;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .btn-reload {
    margin: 20px auto 0;
    display: block;
    background: linear-gradient(135deg, var(--accent) 0%, #84cc16 100%);
    border: none;
    color: #000;
    padding: 12px 28px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: transform 0.2s ease;
  }

  .btn-reload:active {
    transform: scale(0.96);
  }

  .empty-cat {
    grid-column: 1 / -1;
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 14px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius-sm);
  }

  .empty-list {
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }
</style>
</head>
<body>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbzu4t903fABrUbXMMFqVSHmIQpjWa5TA16M5EeqoOWqK7QvlGT73iZUVpNlxTmEjKRA/exec";
</script>

<div id="app">
  <div class="estado">
    <div class="spinner"></div>
    <span>Cargando gastos...</span>
  </div>
</div>

<script>
function getEmojiPorCategoria(cat) {
  const emojis = {
    'CASA': '🏠',
    'COMIDA': '🍽️',
    'MOVILIDAD': '🚕',
    'ANDRE': '🛍️'
  };
  return emojis[cat] || '📌';
}

function colorDot(cat) {
  const valid = ['CASA','COMIDA','MOVILIDAD','ANDRE'];
  return valid.includes(cat) ? cat : 'default';
}

function render(data) {
  const { ciclo, ciclosDisponibles, total, mitad, por_categoria, gastos } = data;
  const totalMax = Math.max(...Object.values(por_categoria), 1);

  // Filtrar gastos normales y cuotas
  const gastosNormales = gastos.filter(g => !g.es_cuota);
  const gastosConCuota = gastos.filter(g => g.es_cuota);

  // Selector de ciclos
  const selectorCiclos = ciclosDisponibles.length === 0
    ? ''
    : `<select class="ciclo-selector" onchange="cambiarCiclo(this.value)">
        ${ciclosDisponibles.map(c => 
          `<option value="${c.inicio}">${c.inicio} → ${c.cierre}</option>`
        ).join('')}
      </select>`;

  // Cards de categoría - ordenar por monto descendente
  const catCards = Object.keys(por_categoria).length === 0
    ? `<div class="empty-cat">📊 Sin gastos en este ciclo</div>`
    : Object.entries(por_categoria)
        .sort((a,b) => b[1] - a[1])
        .map(([cat, monto]) => {
          const pct = Math.round((monto / total) * 100);
          const cls = colorDot(cat);
          const emoji = getEmojiPorCategoria(cat);
          return `
            <div class="cat-card ${cls}">
              <div class="cat-header">
                <div class="cat-emoji">${emoji}</div>
                <div class="cat-name">${cat}</div>
              </div>
              <div class="cat-content">
                <div class="cat-monto"><span class="sym">S/ </span>${monto.toFixed(2)}</div>
                <div class="cat-pct">${pct}% del total</div>
              </div>
            </div>`;
        }).join('');

  // Lista de compras en cuotas
  const cuotasHtml = gastosConCuota.length === 0
    ? ''
    : `
    <div class="section">
      <div class="section-title">Compras en Cuotas</div>
      <div class="cuotas-list">
        ${gastosConCuota.map(c => {
          const porcentajeProgress = (c.cuota_actual / c.cuota_total) * 100;
          const emoji = getEmojiPorCategoria(c.categoria);
          return `
            <div class="cuota-item">
              <div class="cuota-header">
                <div class="cuota-left">
                  <div class="cuota-emoji">${emoji}</div>
                  <div class="cuota-info">
                    <div class="cuota-concepto">${c.concepto || '—'}</div>
                    <div class="cuota-meta">${c.fecha} · ${c.categoria || 'Sin categoría'}</div>
                  </div>
                </div>
                <div class="cuota-monto">S/ ${Number(c.monto).toFixed(2)}</div>
              </div>
              <div class="cuota-progress">
                <div class="cuota-bar">
                  <div class="cuota-fill" style="width: ${porcentajeProgress}%"></div>
                </div>
                <div class="cuota-label">${c.cuota_actual}/${c.cuota_total}</div>
              </div>
            </div>`;
        }).join('')}
      </div>
    </div>`;

  // Lista de gastos normales
  const gastosList = gastosNormales.length === 0
    ? `<div class="empty-list">📭 Sin gastos en este ciclo</div>`
    : gastosNormales.map(g => {
        const cls = colorDot(g.categoria);
        return `
          <div class="gasto-item">
            <div class="gasto-dot ${cls}"></div>
            <div class="gasto-info">
              <div class="gasto-concepto">${g.concepto || '—'}</div>
              <div class="gasto-meta">${g.fecha} · ${g.categoria || 'Sin categoría'}</div>
            </div>
            <div class="gasto-monto">S/ ${Number(g.monto).toFixed(2)}</div>
          </div>`;
      }).join('');

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="header-top">
        <div class="label">Ciclo Actual</div>
        ${selectorCiclos}
      </div>
      <div class="total-grande"><span>S/ </span>${total.toFixed(2)}</div>
      <div class="mitad-row">
        <div class="mitad-chip">Tu parte (50%): <strong>S/ ${mitad.toFixed(2)}</strong></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Por Categoría</div>
      <div class="cat-grid">${catCards}</div>
    </div>

    ${cuotasHtml}

    <div class="section">
      <div class="section-title">Últimos Gastos</div>
      <div class="gastos-list">${gastosList}</div>
    </div>

    <button class="btn-reload" onclick="cargar()">↻ Actualizar</button>
  `;
}

async function cambiarCiclo(cicloInicio) {
  document.getElementById('app').innerHTML = `
    <div class="estado">
      <div class="spinner"></div>
      <span>Cargando ciclo...</span>
    </div>`;
  try {
    const res = await fetch(API_URL + '?ciclo=' + cicloInicio);
    const data = await res.json();
    render(data);
  } catch(err) {
    document.getElementById('app').innerHTML = `
      <div class="estado">
        <span>⚠️ No se pudo conectar</span>
        <button class="btn-reload" onclick="cargar()">Reintentar</button>
      </div>`;
  }
}

async function cargar() {
  document.getElementById('app').innerHTML = `
    <div class="estado">
      <div class="spinner"></div>
      <span>Cargando gastos...</span>
    </div>`;
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    render(data);
  } catch(err) {
    document.getElementById('app').innerHTML = `
      <div class="estado">
        <span>⚠️ No se pudo conectar</span>
        <span style="font-size:12px">Verifica que la URL esté correcta</span>
        <button class="btn-reload" onclick="cargar()">Reintentar</button>
      </div>`;
  }
}

cargar();
</script>
</body>
</html>
