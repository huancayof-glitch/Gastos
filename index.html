<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gastos Compartidos</title>
<link rel="stylesheet" href="./styles.css">
</head>
<body>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbzeApW6uwK3pw0GOE_TQjr-Lcn2i5NjSdHZz3TMHSm04iwIwm8xa6D8YhdITmGh3-NB/exec";
</script>

<div id="app">
  <div class="estado">
    <div class="spinner"></div>
    <span>Cargando gastos...</span>
  </div>
</div>

<script>
function getEmojiPorCategoria(cat) {
  const emojis = {
    'CASA': '🏠',
    'COMIDA': '🍽️',
    'MOVILIDAD': '🚕',
    'ANDRE': '🛍️'
  };
  return emojis[cat] || '📌';
}

function colorDot(cat) {
  const valid = ['CASA','COMIDA','MOVILIDAD','ANDRE'];
  return valid.includes(cat) ? cat : 'default';
}

function formatearFechaCorta(fecha) {
  if (!fecha) return '';
  const texto = String(fecha);
  const match = texto.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (match) {
    return `${match[3]}/${match[2]}/${match[1].slice(-2)}`;
  }
  return texto;
}

function mostrarEstado(mensaje, submensaje = '', mostrarSpinner = false, mostrarBoton = true) {
  const app = document.getElementById('app');
  if (!app) return;
  app.innerHTML = `
    <div class="estado ${submensaje ? 'estado-error' : ''}">
      ${mostrarSpinner ? '<div class="spinner"></div>' : '<span class="estado-icon">⚠️</span>'}
      <span>${mensaje}</span>
      ${submensaje ? `<span class="estado-sub">${submensaje}</span>` : ''}
      ${mostrarBoton ? '<button class="btn-reload" onclick="cargar()">Reintentar</button>' : ''}
    </div>`;
}

function render(data) {
  const payload = data && typeof data === 'object' ? data : {};
  const ciclo = payload.ciclo && typeof payload.ciclo === 'object' ? payload.ciclo : {};
  const ciclosDisponibles = Array.isArray(payload.ciclosDisponibles) ? payload.ciclosDisponibles : [];
  const total = Number(payload.total) || 0;
  const mitad = Number(payload.mitad) || 0;
  const porCategoria = payload.por_categoria && typeof payload.por_categoria === 'object' ? payload.por_categoria : {};
  const gastos = Array.isArray(payload.gastos) ? payload.gastos : [];

  const gastosNormales = gastos.filter(g => !g.es_cuota);
  const gastosConCuota = gastos.filter(g => g.es_cuota);

  const cicloActualTexto = formatearFechaCorta(ciclo.inicio) && formatearFechaCorta(ciclo.cierre)
    ? `${formatearFechaCorta(ciclo.inicio)} → ${formatearFechaCorta(ciclo.cierre)}`
    : '';

  const selectorCiclos = ciclosDisponibles.length === 0
    ? ''
    : `<select class="ciclo-selector" onchange="cambiarCiclo(this.value)">
        ${ciclosDisponibles.map(c => 
          `<option value="${c.inicio}" ${c.inicio === ciclo.inicio ? 'selected' : ''}>${formatearFechaCorta(c.inicio)} → ${formatearFechaCorta(c.cierre)}</option>`
        ).join('')}
      </select>`;

  const catCards = Object.keys(porCategoria).length === 0
    ? `<div class="empty-cat">📊 No hay gastos registrados en este ciclo</div>`
    : Object.entries(porCategoria)
        .sort((a,b) => b[1] - a[1])
        .map(([cat, monto]) => {
          const pct = total > 0 ? Math.round((monto / total) * 100) : 0;
          const cls = colorDot(cat);
          const emoji = getEmojiPorCategoria(cat);
          return `
            <div class="cat-card ${cls}">
              <div class="cat-header">
                <div class="cat-emoji">${emoji}</div>
                <div class="cat-name">${cat}</div>
              </div>
              <div class="cat-content">
                <div class="cat-monto"><span class="sym">S/ </span>${Number(monto || 0).toFixed(2)}</div>
                <div class="cat-pct">${pct}% del total</div>
              </div>
            </div>`;
        }).join('');

  const cuotasHtml = gastosConCuota.length === 0
    ? ''
    : `
    <div class="section">
      <div class="section-title">Compras en Cuotas</div>
      <div class="cuotas-list">
        ${gastosConCuota.map(c => {
          const porcentajeProgress = Number(c.cuota_total) > 0 ? (Number(c.cuota_actual) / Number(c.cuota_total)) * 100 : 0;
          const emoji = getEmojiPorCategoria(c.categoria);
          return `
            <div class="cuota-item">
              <div class="cuota-header">
                <div class="cuota-left">
                  <div class="cuota-emoji">${emoji}</div>
                  <div class="cuota-info">
                    <div class="cuota-concepto">${c.concepto || '—'}</div>
                    <div class="cuota-meta">${c.fecha} · ${c.categoria || 'Sin categoría'}</div>
                  </div>
                </div>
                <div class="cuota-monto">S/ ${Number(c.monto || 0).toFixed(2)}</div>
              </div>
              <div class="cuota-progress">
                <div class="cuota-bar">
                  <div class="cuota-fill" style="width: ${porcentajeProgress}%"></div>
                </div>
                <div class="cuota-label">${c.cuota_actual}/${c.cuota_total}</div>
              </div>
            </div>`;
        }).join('')}
      </div>
    </div>`;

  const gastosList = gastosNormales.length === 0
    ? `<div class="empty-list">📭 No hay gastos normales en este ciclo</div>`
    : gastosNormales.map(g => {
        const cls = colorDot(g.categoria);
        return `
          <div class="gasto-item">
            <div class="gasto-dot ${cls}"></div>
            <div class="gasto-info">
              <div class="gasto-concepto">${g.concepto || '—'}</div>
              <div class="gasto-meta">${g.fecha} · ${g.categoria || 'Sin categoría'}</div>
            </div>
            <div class="gasto-monto">S/ ${Number(g.monto || 0).toFixed(2)}</div>
          </div>`;
      }).join('');

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="header-top">
        <div class="label">Ciclo Actual</div>
        <div class="ciclo-actual">${cicloActualTexto}</div>
        ${selectorCiclos}
      </div>
      <div class="total-grande"><span>S/ </span>${Number(total).toFixed(2)}</div>
      <div class="mitad-row">
        <div class="mitad-chip">Tu parte (50%): <strong>S/ ${Number(mitad).toFixed(2)}</strong></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Por Categoría</div>
      <div class="cat-grid">${catCards}</div>
    </div>

    ${cuotasHtml}

    <div class="section">
      <div class="section-title">Últimos Gastos</div>
      <div class="gastos-list">${gastosList}</div>
    </div>

    <button class="btn-reload" onclick="cargar()">↻ Actualizar</button>
  `;
}

async function cambiarCiclo(cicloInicio) {
  mostrarEstado('Cargando ciclo...', '', true, false);
  try {
    const res = await fetch(`${API_URL}?ciclo=${encodeURIComponent(cicloInicio)}`, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    render(data);
  } catch (err) {
    mostrarEstado('No se pudo conectar', 'No fue posible cargar el ciclo seleccionado.', false, true);
  }
}

async function cargar() {
  mostrarEstado('Cargando gastos...', '', true, false);
  try {
    const res = await fetch(API_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    render(data);
  } catch (err) {
    mostrarEstado('No se pudo conectar', 'Verifica que la URL esté correcta o que la API responda.', false, true);
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', cargar);
} else {
  cargar();
}
</script>
</body>
</html>
